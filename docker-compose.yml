services:
  magic_pinecone:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic_pinecone_backend
    command: sh -c "uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - apim_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  digirunner:
    image: tpisoftwareopensource/digirunner-open-source:release-v4.7.3
    container_name: digirunner_gateway
    ports:
      - "18080:18080"
    networks:
      - apim_network
    depends_on:
      - magic_pinecone
    restart: unless-stopped
    volumes:
      - digirunner_data:/var/lib/digirunner

  db:
    image: postgres:17.10
    container_name: magic_pinecone_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/
    ports:
      - "5432"
    networks:
      - apim_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:5.4.2
    container_name: magic_pinecone_adminer
    ports:
      - '8081:8080'
    networks:
      - apim_network
    depends_on:
      - db

networks:
  apim_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  digirunner_data:
    driver: local

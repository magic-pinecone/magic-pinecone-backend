services:
  magic_pinecone:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic_pinecone_backend
    command: sh -c "uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - public_net
      - app_net
      - db_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  digirunner:
    image: tpisoftwareopensource/digirunner-open-source:release-v4.7.3
    container_name: digirunner_gateway
    expose:
      - "18080"
    networks:
      - public_net
      - app_net
    depends_on:
      - magic_pinecone
    restart: unless-stopped
    volumes:
      - digirunner_data:/var/lib/digirunner
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/var/lib/digirunner/dgrdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE;Mode=MySQL
      - SPRING_SQL_INIT_MODE=always
      - SPRING_SQL_INIT_CONTINUE_ON_ERROR=true


  db:
    image: postgres:17.10
    container_name: magic_pinecone_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/
    expose:
      - "5432"
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:5.4.2
    container_name: magic_pinecone_adminer
    expose:
      - "8080"
    networks:
      - public_net
      - db_net
    depends_on:
      - db

  caddy:
    image: caddy:2.9.1-alpine
    container_name: magic_pinecone_caddy
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "18080:18080"
      - "8081:8081"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public_net
    depends_on:
      - magic_pinecone
      - digirunner
      - adminer

networks:
  public_net:
    driver: bridge
  app_net:
    driver: bridge
  db_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  digirunner_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

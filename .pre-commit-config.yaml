repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # 使用最新的版本號
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # Custom Alembic Checking
  - repo: local
    hooks:
      - id: alembic-check
        name: Check for unstaged Alembic migrations
        stages: [pre-push]
        entry: docker compose exec -T magic_pinecone uv run alembic check
        language: system
        pass_filenames: false
        always_run: true
